<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2 Player Snake</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      text-align: center;
    }

    h1 {
      margin-bottom: 12px;
    }

    .menu, .game-over {
      margin-bottom: 16px;
    }

    button {
      margin: 6px;
      padding: 10px 18px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: #2d6cdf;
      color: white;
    }

    button:hover {
      background: #1f57b8;
    }

    canvas {
      background: #1b1b1b;
      border: 3px solid #444;
      image-rendering: pixelated;
    }

    .hidden {
      display: none;
    }

    .info {
      margin: 10px 0;
      font-size: 16px;
      line-height: 1.6;
    }

    .legend {
      margin-top: 10px;
      font-size: 14px;
      color: #ccc;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>2 Player Snake</h1>

    <div id="menu" class="menu">
      <p>Select game mode</p>
      <button id="pvpBtn">Player vs Player</button>
      <button id="pvcBtn">Player vs Computer</button>
    </div>

    <div id="hud" class="info hidden">
      <div id="modeText"></div>
      <div id="scoreText"></div>
      <div>Race to 11 points</div>
      <div>Wrap-around enabled</div>
    </div>

    <canvas id="gameCanvas" width="600" height="600" class="hidden"></canvas>

    <div class="legend">
      Player 1: WASD<br />
      Player 2: IJKL
    </div>

    <div id="gameOver" class="game-over hidden">
      <h2 id="gameOverText">Game Over</h2>
      <button id="restartBtn">Restart</button>
      <button id="menuBtn">Main Menu</button>
    </div>
  </div>

  <script>
    const GRID_SIZE = 20;
    const TILE_SIZE = 30;
    const GAME_SPEED = 130;
    const WIN_SCORE = 11;

    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const menu = document.getElementById("menu");
    const hud = document.getElementById("hud");
    const gameOverPanel = document.getElementById("gameOver");
    const gameOverText = document.getElementById("gameOverText");
    const scoreText = document.getElementById("scoreText");
    const modeText = document.getElementById("modeText");

    const pvpBtn = document.getElementById("pvpBtn");
    const pvcBtn = document.getElementById("pvcBtn");
    const restartBtn = document.getElementById("restartBtn");
    const menuBtn = document.getElementById("menuBtn");

    let mode = "pvp";
    let loop = null;
    let food = null;
    let gameEnded = false;

    let snake1 = null;
    let snake2 = null;

    function createSnake(body, dir, color, name, isAI = false) {
      return {
        body,
        dir,
        nextDir: dir,
        color,
        name,
        isAI,
        alive: true,
        score: 0
      };
    }

    function resetGame() {
      snake1 = createSnake(
        [
          { x: 4, y: 10 },
          { x: 3, y: 10 },
          { x: 2, y: 10 }
        ],
        { x: 1, y: 0 },
        "#32cd32",
        "Player 1",
        false
      );

      snake2 = createSnake(
        [
          { x: 15, y: 10 },
          { x: 16, y: 10 },
          { x: 17, y: 10 }
        ],
        { x: -1, y: 0 },
        "#ff5555",
        mode === "pvc" ? "Computer" : "Player 2",
        mode === "pvc"
      );

      food = spawnFood();
      gameEnded = false;
      updateHUD();
      draw();
    }

    function startGame(selectedMode) {
      mode = selectedMode;
      menu.classList.add("hidden");
      gameOverPanel.classList.add("hidden");
      canvas.classList.remove("hidden");
      hud.classList.remove("hidden");

      modeText.textContent =
        mode === "pvp" ? "Mode: Player vs Player" : "Mode: Player vs Computer";

      resetGame();

      if (loop) clearInterval(loop);
      loop = setInterval(gameStep, GAME_SPEED);
    }

    function backToMenu() {
      if (loop) clearInterval(loop);
      canvas.classList.add("hidden");
      hud.classList.add("hidden");
      gameOverPanel.classList.add("hidden");
      menu.classList.remove("hidden");
    }

    function updateHUD() {
      scoreText.textContent = `${snake1.name}: ${snake1.score} | ${snake2.name}: ${snake2.score}`;
    }

    function spawnFood() {
      while (true) {
        const pos = {
          x: Math.floor(Math.random() * GRID_SIZE),
          y: Math.floor(Math.random() * GRID_SIZE)
        };

        if (!isOccupied(pos.x, pos.y)) {
          return pos;
        }
      }
    }

    function isOccupied(x, y) {
      for (const part of snake1.body) {
        if (part.x === x && part.y === y) return true;
      }
      for (const part of snake2.body) {
        if (part.x === x && part.y === y) return true;
      }
      return false;
    }

    function isOppositeDir(a, b) {
      return a.x === -b.x && a.y === -b.y;
    }

    function setSnakeDirection(snake, newDir) {
      if (!snake) return;
      if (!isOppositeDir(newDir, snake.dir)) {
        snake.nextDir = newDir;
      }
    }

    document.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();

      if (gameEnded) return;
      if (!snake1 || !snake2) return;

      if (key === "w") setSnakeDirection(snake1, { x: 0, y: -1 });
      else if (key === "s") setSnakeDirection(snake1, { x: 0, y: 1 });
      else if (key === "a") setSnakeDirection(snake1, { x: -1, y: 0 });
      else if (key === "d") setSnakeDirection(snake1, { x: 1, y: 0 });

      if (!snake2.isAI) {
        if (key === "i") setSnakeDirection(snake2, { x: 0, y: -1 });
        else if (key === "k") setSnakeDirection(snake2, { x: 0, y: 1 });
        else if (key === "j") setSnakeDirection(snake2, { x: -1, y: 0 });
        else if (key === "l") setSnakeDirection(snake2, { x: 1, y: 0 });
      }
    });

    function wrapPosition(pos) {
      return {
        x: (pos.x + GRID_SIZE) % GRID_SIZE,
        y: (pos.y + GRID_SIZE) % GRID_SIZE
      };
    }

    function gameStep() {
      if (gameEnded) return;

      if (snake2.isAI) {
        snake2.nextDir = getAIDirection();
      }

      snake1.dir = snake1.nextDir;
      snake2.dir = snake2.nextDir;

      const nextHead1 = wrapPosition({
        x: snake1.body[0].x + snake1.dir.x,
        y: snake1.body[0].y + snake1.dir.y
      });

      const nextHead2 = wrapPosition({
        x: snake2.body[0].x + snake2.dir.x,
        y: snake2.body[0].y + snake2.dir.y
      });

      const grow1 = nextHead1.x === food.x && nextHead1.y === food.y;
      const grow2 = nextHead2.x === food.x && nextHead2.y === food.y;

      const dead1 = checkCollision(nextHead1, snake1, snake2, grow1, grow2);
      const dead2 = checkCollision(nextHead2, snake2, snake1, grow2, grow1);

      if (nextHead1.x === nextHead2.x && nextHead1.y === nextHead2.y) {
        endGame("Draw! Head-on collision.");
        return;
      }

      if (dead1 && dead2) {
        endGame("Draw! Both snakes crashed.");
        return;
      }

      if (dead1) {
        endGame(`${snake2.name} wins!`);
        return;
      }

      if (dead2) {
        endGame(`${snake1.name} wins!`);
        return;
      }

      moveSnake(snake1, nextHead1, grow1);
      moveSnake(snake2, nextHead2, grow2);

      let ate = false;

      if (grow1 && grow2) {
        snake1.score++;
        snake2.score++;
        ate = true;
      } else if (grow1) {
        snake1.score++;
        ate = true;
      } else if (grow2) {
        snake2.score++;
        ate = true;
      }

      if (snake1.score >= WIN_SCORE && snake2.score >= WIN_SCORE) {
        endGame("Draw! Both reached 11.");
        return;
      }

      if (snake1.score >= WIN_SCORE) {
        endGame(`${snake1.name} wins by reaching 11!`);
        return;
      }

      if (snake2.score >= WIN_SCORE) {
        endGame(`${snake2.name} wins by reaching 11!`);
        return;
      }

      if (ate) {
        food = spawnFood();
      }

      updateHUD();
      draw();
    }

    function moveSnake(snake, newHead, grow) {
      snake.body.unshift(newHead);
      if (!grow) {
        snake.body.pop();
      }
    }

    function checkCollision(nextHead, selfSnake, otherSnake, selfGrow, otherGrow) {
      for (let i = 0; i < selfSnake.body.length; i++) {
        const part = selfSnake.body[i];
        const isTail = i === selfSnake.body.length - 1;

        if (isTail && !selfGrow) {
          continue;
        }

        if (part.x === nextHead.x && part.y === nextHead.y) {
          return true;
        }
      }

      for (let i = 0; i < otherSnake.body.length; i++) {
        const part = otherSnake.body[i];
        const isTail = i === otherSnake.body.length - 1;

        if (isTail && !otherGrow) {
          continue;
        }

        if (part.x === nextHead.x && part.y === nextHead.y) {
          return true;
        }
      }

      return false;
    }

    function getAIDirection() {
      const directions = [
        { x: 0, y: -1 },
        { x: 0, y: 1 },
        { x: -1, y: 0 },
        { x: 1, y: 0 }
      ];

      const valid = directions.filter((dir) => {
        if (isOppositeDir(dir, snake2.dir)) return false;

        const next = wrapPosition({
          x: snake2.body[0].x + dir.x,
          y: snake2.body[0].y + dir.y
        });

        return !wouldCrash(next, snake2, snake1);
      });

      if (valid.length === 0) {
        return snake2.dir;
      }

      valid.sort((a, b) => {
        const nextA = wrapPosition({
          x: snake2.body[0].x + a.x,
          y: snake2.body[0].y + a.y
        });

        const nextB = wrapPosition({
          x: snake2.body[0].x + b.x,
          y: snake2.body[0].y + b.y
        });

        const distA = wrappedDistance(nextA.x, nextA.y, food.x, food.y);
        const distB = wrappedDistance(nextB.x, nextB.y, food.x, food.y);

        return distA - distB;
      });

      return valid[0];
    }

    function wouldCrash(nextHead, selfSnake, otherSnake) {
      for (let i = 0; i < selfSnake.body.length; i++) {
        const part = selfSnake.body[i];
        if (part.x === nextHead.x && part.y === nextHead.y) {
          return true;
        }
      }

      for (let i = 0; i < otherSnake.body.length; i++) {
        const part = otherSnake.body[i];
        if (part.x === nextHead.x && part.y === nextHead.y) {
          return true;
        }
      }

      return false;
    }

    function wrappedDistance(x1, y1, x2, y2) {
      const dx = Math.min(Math.abs(x1 - x2), GRID_SIZE - Math.abs(x1 - x2));
      const dy = Math.min(Math.abs(y1 - y2), GRID_SIZE - Math.abs(y1 - y2));
      return dx + dy;
    }

    function endGame(message) {
      gameEnded = true;
      clearInterval(loop);
      gameOverText.textContent = message;
      gameOverPanel.classList.remove("hidden");
    }

    function drawGrid() {
      ctx.strokeStyle = "#2c2c2c";
      ctx.lineWidth = 1;

      for (let i = 0; i <= GRID_SIZE; i++) {
        ctx.beginPath();
        ctx.moveTo(i * TILE_SIZE, 0);
        ctx.lineTo(i * TILE_SIZE, GRID_SIZE * TILE_SIZE);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(0, i * TILE_SIZE);
        ctx.lineTo(GRID_SIZE * TILE_SIZE, i * TILE_SIZE);
        ctx.stroke();
      }
    }

    function drawSnake(snake) {
      for (let i = 0; i < snake.body.length; i++) {
        const part = snake.body[i];
        ctx.fillStyle = i === 0 ? brightenColor(snake.color) : snake.color;
        ctx.fillRect(
          part.x * TILE_SIZE + 2,
          part.y * TILE_SIZE + 2,
          TILE_SIZE - 4,
          TILE_SIZE - 4
        );
      }
    }

    function drawFood() {
      ctx.fillStyle = "#ffd700";
      ctx.beginPath();
      ctx.arc(
        food.x * TILE_SIZE + TILE_SIZE / 2,
        food.y * TILE_SIZE + TILE_SIZE / 2,
        TILE_SIZE / 3,
        0,
        Math.PI * 2
      );
      ctx.fill();
    }

    function brightenColor(hex) {
      if (hex === "#32cd32") return "#7CFC00";
      if (hex === "#ff5555") return "#ff8888";
      return hex;
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawGrid();
      drawFood();
      drawSnake(snake1);
      drawSnake(snake2);
    }

    pvpBtn.addEventListener("click", () => startGame("pvp"));
    pvcBtn.addEventListener("click", () => startGame("pvc"));
    restartBtn.addEventListener("click", () => startGame(mode));
    menuBtn.addEventListener("click", backToMenu);
  </script>
</body>
</html>
