<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />

  <title>Drone Gamepad | Mobile Controller</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at center, #111933, #050816);
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
      touch-action: none;
    }

    .screen {
      width: 100vw;
      height: 100vh;
      padding: 18px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
    }

    h1 {
      margin: 0;
      color: cyan;
      font-size: 26px;
      text-shadow: 0 0 14px cyan;
    }

    .panel {
      width: 100%;
      max-width: 430px;
      padding: 14px;
      border: 1px solid rgba(0, 255, 255, 0.35);
      border-radius: 16px;
      background: rgba(0, 0, 0, 0.35);
      box-shadow: 0 0 18px rgba(0, 255, 255, 0.2);
    }

    input {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 12px;
      border: 1px solid cyan;
      background: #07101f;
      color: white;
      font-size: 18px;
      text-align: center;
      outline: none;
    }

    button {
      border: 2px solid cyan;
      background: rgba(0, 255, 255, 0.12);
      color: white;
      border-radius: 18px;
      font-weight: bold;
      box-shadow: 0 0 16px rgba(0, 255, 255, 0.35);
    }

    button:active,
    button.active {
      background: cyan;
      color: #050816;
    }

    #connectBtn,
    #motionBtn {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      font-size: 18px;
    }

    #status {
      margin-top: 10px;
      font-size: 14px;
      opacity: 0.85;
      text-align: center;
    }

    .controls {
      width: 100%;
      max-width: 430px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    #joystickBase {
      width: 190px;
      height: 190px;
      border-radius: 50%;
      border: 2px solid cyan;
      position: relative;
      box-shadow: 0 0 22px rgba(0, 255, 255, 0.55);
      background: rgba(0, 255, 255, 0.08);
      flex-shrink: 0;
    }

    #joystickStick {
      width: 74px;
      height: 74px;
      border-radius: 50%;
      background: cyan;
      position: absolute;
      left: 56px;
      top: 56px;
      box-shadow: 0 0 22px cyan;
    }

    .buttons {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .gameBtn {
      height: 70px;
      font-size: 20px;
    }

    .motionData {
      width: 100%;
      max-width: 430px;
      font-size: 13px;
      opacity: 0.8;
      text-align: center;
      line-height: 1.5;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>
  <div class="screen">

    <div class="panel">
      <h1>Drone Gamepad</h1>

      <input id="peerCodeInput" placeholder="Enter desktop pair code" />

      <button id="connectBtn">Connect</button>

      <button id="motionBtn">Enable Motion Control</button>

      <div id="status">Not connected</div>
    </div>

    <div class="controls">
      <div id="joystickBase">
        <div id="joystickStick"></div>
      </div>

      <div class="buttons">
        <button id="boostBtn" class="gameBtn">BOOST</button>
        <button id="brakeBtn" class="gameBtn">BRAKE</button>
      </div>
    </div>

    <div class="motionData">
      Control Mode: <span id="controlMode">Joystick</span><br />
      Tilt X: <span id="tiltX">0.00</span> |
      Tilt Y: <span id="tiltY">0.00</span>
    </div>

  </div>

  <!-- PeerJS CDN -->
  <script src="https://unpkg.com/peerjs@1.5.5/dist/peerjs.min.js"></script>

  <script>
    const peerCodeInput = document.getElementById("peerCodeInput");
    const connectBtn = document.getElementById("connectBtn");
    const motionBtn = document.getElementById("motionBtn");
    const statusEl = document.getElementById("status");

    const base = document.getElementById("joystickBase");
    const stick = document.getElementById("joystickStick");

    const boostBtn = document.getElementById("boostBtn");
    const brakeBtn = document.getElementById("brakeBtn");

    const controlModeEl = document.getElementById("controlMode");
    const tiltXEl = document.getElementById("tiltX");
    const tiltYEl = document.getElementById("tiltY");

    let peer;
    let conn;

    let inputX = 0;
    let inputY = 0;
    let boost = false;
    let brake = false;

    let motionEnabled = false;

    const MOTION_DEADZONE = 0.08;
    const MOTION_SENSITIVITY = 0.045;

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function applyDeadzone(value) {
      if (Math.abs(value) < MOTION_DEADZONE) return 0;
      return value;
    }

    function sendInput() {
      if (conn && conn.open) {
        conn.send({
          type: "input",
          x: inputX,
          y: inputY,
          boost: boost,
          brake: brake,
          controlMode: motionEnabled ? "motion" : "joystick"
        });
      }
    }

    setInterval(sendInput, 16);

    connectBtn.addEventListener("click", () => {
      const desktopPeerId = peerCodeInput.value.trim();

      if (!desktopPeerId) {
        statusEl.textContent = "Enter the desktop pair code first.";
        return;
      }

      peer = new Peer();

      peer.on("open", () => {
        conn = peer.connect(desktopPeerId);

        conn.on("open", () => {
          statusEl.textContent = "Connected to desktop.";
        });

        conn.on("close", () => {
          statusEl.textContent = "Connection closed.";
        });

        conn.on("error", () => {
          statusEl.textContent = "Connection error.";
        });
      });

      peer.on("error", (err) => {
        statusEl.textContent = "Peer error: " + err.type;
      });
    });

    function handleJoystick(clientX, clientY) {
      if (motionEnabled) return;

      const rect = base.getBoundingClientRect();

      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;

      let dx = clientX - centerX;
      let dy = clientY - centerY;

      const maxRadius = rect.width / 2 - 37;
      const distance = Math.sqrt(dx * dx + dy * dy);

      if (distance > maxRadius) {
        dx = (dx / distance) * maxRadius;
        dy = (dy / distance) * maxRadius;
      }

      inputX = dx / maxRadius;
      inputY = dy / maxRadius;

      stick.style.left = 56 + dx + "px";
      stick.style.top = 56 + dy + "px";
    }

    function resetJoystick() {
      if (motionEnabled) return;

      inputX = 0;
      inputY = 0;

      stick.style.left = "56px";
      stick.style.top = "56px";
    }

    base.addEventListener("touchstart", (e) => {
      const touch = e.touches[0];
      handleJoystick(touch.clientX, touch.clientY);
    });

    base.addEventListener("touchmove", (e) => {
      const touch = e.touches[0];
      handleJoystick(touch.clientX, touch.clientY);
      e.preventDefault();
    }, { passive: false });

    base.addEventListener("touchend", () => {
      resetJoystick();
    });

    base.addEventListener("mousedown", (e) => {
      handleJoystick(e.clientX, e.clientY);

      function moveHandler(ev) {
        handleJoystick(ev.clientX, ev.clientY);
      }

      function upHandler() {
        resetJoystick();
        window.removeEventListener("mousemove", moveHandler);
        window.removeEventListener("mouseup", upHandler);
      }

      window.addEventListener("mousemove", moveHandler);
      window.addEventListener("mouseup", upHandler);
    });

    boostBtn.addEventListener("touchstart", () => {
      boost = true;
      boostBtn.classList.add("active");
    });

    boostBtn.addEventListener("touchend", () => {
      boost = false;
      boostBtn.classList.remove("active");
    });

    boostBtn.addEventListener("mousedown", () => {
      boost = true;
      boostBtn.classList.add("active");
    });

    boostBtn.addEventListener("mouseup", () => {
      boost = false;
      boostBtn.classList.remove("active");
    });

    brakeBtn.addEventListener("touchstart", () => {
      brake = true;
      brakeBtn.classList.add("active");
    });

    brakeBtn.addEventListener("touchend", () => {
      brake = false;
      brakeBtn.classList.remove("active");
    });

    brakeBtn.addEventListener("mousedown", () => {
      brake = true;
      brakeBtn.classList.add("active");
    });

    brakeBtn.addEventListener("mouseup", () => {
      brake = false;
      brakeBtn.classList.remove("active");
    });

    async function enableMotionControls() {
      try {
        if (
          typeof DeviceOrientationEvent !== "undefined" &&
          typeof DeviceOrientationEvent.requestPermission === "function"
        ) {
          const permission = await DeviceOrientationEvent.requestPermission();

          if (permission !== "granted") {
            statusEl.textContent = "Motion permission denied.";
            return;
          }
        }

        motionEnabled = !motionEnabled;

        if (motionEnabled) {
          motionBtn.textContent = "Disable Motion Control";
          motionBtn.classList.add("active");
          controlModeEl.textContent = "Motion";
          stick.style.left = "56px";
          stick.style.top = "56px";
          statusEl.textContent = "Motion control enabled.";
        } else {
          motionBtn.textContent = "Enable Motion Control";
          motionBtn.classList.remove("active");
          controlModeEl.textContent = "Joystick";
          inputX = 0;
          inputY = 0;
          statusEl.textContent = "Joystick control enabled.";
        }
      } catch (error) {
        statusEl.textContent = "Motion control not available.";
      }
    }

    motionBtn.addEventListener("click", enableMotionControls);

    window.addEventListener("deviceorientation", (event) => {
      if (!motionEnabled) return;

      /*
        beta  = front/back tilt, roughly -180 to 180
        gamma = left/right tilt, roughly -90 to 90

        Holding phone flat:
        gamma controls left/right
        beta controls forward/back

        We map:
        gamma → inputX
        beta  → inputY
      */

      let gamma = event.gamma || 0;
      let beta = event.beta || 0;

      let x = gamma * MOTION_SENSITIVITY;
      let y = beta * MOTION_SENSITIVITY;

      x = clamp(x, -1, 1);
      y = clamp(y, -1, 1);

      x = applyDeadzone(x);
      y = applyDeadzone(y);

      inputX = x;
      inputY = y;

      tiltXEl.textContent = inputX.toFixed(2);
      tiltYEl.textContent = inputY.toFixed(2);

      const visualX = inputX * 56;
      const visualY = inputY * 56;

      stick.style.left = 56 + visualX + "px";
      stick.style.top = 56 + visualY + "px";
    });
  </script>
</body>
</html>
