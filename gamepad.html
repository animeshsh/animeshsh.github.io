<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, user-scalable=no"
  />

  <title>Drone Gamepad | Mobile Controller</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, #111933, #050816);
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
      touch-action: none;
    }

    .screen {
      width: 100vw;
      height: 100vh;
      padding: 16px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
    }

    .panel {
      width: 100%;
      max-width: 430px;
      padding: 14px;
      border: 1px solid rgba(0, 255, 255, 0.35);
      border-radius: 16px;
      background: rgba(0, 0, 0, 0.38);
      box-shadow: 0 0 18px rgba(0, 255, 255, 0.2);
      backdrop-filter: blur(8px);
    }

    h1 {
      margin: 0 0 8px 0;
      color: cyan;
      font-size: 26px;
      text-align: center;
      text-shadow: 0 0 14px cyan;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 12px;
      border: 1px solid cyan;
      background: #07101f;
      color: white;
      font-size: 18px;
      text-align: center;
      outline: none;
      letter-spacing: 1px;
    }

    button {
      border: 2px solid cyan;
      background: rgba(0, 255, 255, 0.12);
      color: white;
      border-radius: 18px;
      font-weight: bold;
      box-shadow: 0 0 16px rgba(0, 255, 255, 0.35);
      touch-action: none;
    }

    button:active,
    button.active {
      background: cyan;
      color: #050816;
    }

    #connectBtn,
    #disconnectBtn,
    #motionBtn {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      font-size: 18px;
    }

    #disconnectBtn {
      border-color: #ff4fd8;
      background: rgba(255, 79, 216, 0.12);
    }

    #status {
      margin-top: 10px;
      font-size: 14px;
      opacity: 0.92;
      text-align: center;
      line-height: 1.45;
    }

    #debugBox {
      margin-top: 10px;
      padding: 9px;
      border-radius: 12px;
      border: 1px solid rgba(0, 255, 255, 0.22);
      background: rgba(0, 255, 255, 0.06);
      color: #cff;
      font-size: 12px;
      line-height: 1.45;
      word-break: break-word;
    }

    .controls {
      width: 100%;
      max-width: 430px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    #joystickBase {
      width: 190px;
      height: 190px;
      border-radius: 50%;
      border: 2px solid cyan;
      position: relative;
      box-shadow: 0 0 22px rgba(0, 255, 255, 0.55);
      background: rgba(0, 255, 255, 0.08);
      flex-shrink: 0;
    }

    #joystickStick {
      width: 74px;
      height: 74px;
      border-radius: 50%;
      background: cyan;
      position: absolute;
      left: 56px;
      top: 56px;
      box-shadow: 0 0 22px cyan;
      pointer-events: none;
    }

    .buttons {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .gameBtn {
      height: 70px;
      font-size: 20px;
    }

    .motionData {
      width: 100%;
      max-width: 430px;
      font-size: 13px;
      opacity: 0.85;
      text-align: center;
      line-height: 1.5;
      padding-bottom: 4px;
    }

    @media (orientation: landscape) and (max-height: 520px) {
      .screen {
        flex-direction: row;
        gap: 12px;
        padding: 10px;
      }

      .panel {
        max-width: 300px;
      }

      .controls {
        max-width: 420px;
      }

      h1 {
        font-size: 20px;
      }

      #joystickBase {
        width: 170px;
        height: 170px;
      }

      .gameBtn {
        height: 60px;
      }

      .motionData {
        max-width: 240px;
        font-size: 12px;
      }
    }
  </style>
</head>

<body>
  <div class="screen">

    <div class="panel">
      <h1>Drone Gamepad</h1>

      <input
        id="peerCodeInput"
        placeholder="Enter desktop pair code"
        autocomplete="off"
        autocapitalize="none"
        spellcheck="false"
      />

      <button id="connectBtn">Connect</button>
      <button id="disconnectBtn">Disconnect</button>
      <button id="motionBtn">Enable Motion Control</button>

      <div id="status">Not connected</div>

      <div id="debugBox">
        PeerJS: <span id="peerDebug">Checking...</span><br />
        Mobile Peer ID: <span id="mobilePeerId">Not created</span><br />
        Target Desktop ID: <span id="targetPeerId">None</span>
      </div>
    </div>

    <div class="controls">
      <div id="joystickBase">
        <div id="joystickStick"></div>
      </div>

      <div class="buttons">
        <button id="boostBtn" class="gameBtn">BOOST</button>
        <button id="brakeBtn" class="gameBtn">BRAKE</button>
      </div>
    </div>

    <div class="motionData">
      Control Mode: <span id="controlMode">Joystick</span><br />
      X: <span id="tiltX">0.00</span> |
      Y: <span id="tiltY">0.00</span>
    </div>

  </div>

  <script src="https://unpkg.com/peerjs@1.5.5/dist/peerjs.min.js"></script>

  <script>
    const peerCodeInput = document.getElementById("peerCodeInput");
    const connectBtn = document.getElementById("connectBtn");
    const disconnectBtn = document.getElementById("disconnectBtn");
    const motionBtn = document.getElementById("motionBtn");
    const statusEl = document.getElementById("status");

    const peerDebug = document.getElementById("peerDebug");
    const mobilePeerId = document.getElementById("mobilePeerId");
    const targetPeerId = document.getElementById("targetPeerId");

    const base = document.getElementById("joystickBase");
    const stick = document.getElementById("joystickStick");

    const boostBtn = document.getElementById("boostBtn");
    const brakeBtn = document.getElementById("brakeBtn");

    const controlModeEl = document.getElementById("controlMode");
    const tiltXEl = document.getElementById("tiltX");
    const tiltYEl = document.getElementById("tiltY");

    let peer = null;
    let conn = null;

    let inputX = 0;
    let inputY = 0;
    let boost = false;
    let brake = false;
    let motionEnabled = false;

    const MOTION_DEADZONE = 0.08;
    const MOTION_SENSITIVITY = 0.045;

    const PEER_CONFIG = {
      host: "0.peerjs.com",
      port: 443,
      path: "/",
      secure: true,
      debug: 2,
      config: {
        iceServers: [
          { urls: "stun:stun.l.google.com:19302" },
          { urls: "stun:global.stun.twilio.com:3478" }
        ]
      }
    };

    function setStatus(message) {
      statusEl.textContent = message;
    }

    function updateDebug() {
      peerDebug.textContent = typeof Peer === "undefined" ? "Not loaded" : "Loaded";
    }

    updateDebug();

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function applyDeadzone(value) {
      if (Math.abs(value) < MOTION_DEADZONE) {
        return 0;
      }

      return value;
    }

    function cleanPeerCode(code) {
      return code
        .trim()
        .replace(/\s+/g, "")
        .replace(/[“”]/g, "")
        .replace(/[‘’]/g, "");
    }

    function sendInput() {
      if (!conn || !conn.open) {
        return;
      }

      conn.send({
        type: "input",
        x: inputX,
        y: inputY,
        boost: boost,
        brake: brake,
        controlMode: motionEnabled ? "motion" : "joystick"
      });
    }

    setInterval(sendInput, 16);

    function disconnectExisting() {
      if (conn) {
        try {
          conn.close();
        } catch (error) {}

        conn = null;
      }

      if (peer) {
        try {
          peer.destroy();
        } catch (error) {}

        peer = null;
      }

      mobilePeerId.textContent = "Not created";
      connectBtn.classList.remove("active");
    }

    function connectToDesktop() {
      const desktopPeerId = cleanPeerCode(peerCodeInput.value);

      if (!desktopPeerId) {
        setStatus("Enter the desktop pair code first.");
        return;
      }

      targetPeerId.textContent = desktopPeerId;

      if (typeof Peer === "undefined") {
        peerDebug.textContent = "Not loaded";
        setStatus("PeerJS did not load. Refresh the page or check internet.");
        return;
      }

      disconnectExisting();

      setStatus("Creating mobile peer...");

      try {
        peer = new Peer(null, PEER_CONFIG);
      } catch (error) {
        setStatus("Could not create mobile peer: " + error.message);
        return;
      }

      peer.on("open", (id) => {
        mobilePeerId.textContent = id;
        setStatus("Mobile peer ready. Connecting to desktop...");

        conn = peer.connect(desktopPeerId, {
          reliable: true,
          serialization: "json"
        });

        conn.on("open", () => {
          connectBtn.classList.add("active");
          setStatus("Connected to desktop. Use joystick or motion.");
        });

        conn.on("close", () => {
          connectBtn.classList.remove("active");
          setStatus("Connection closed.");
        });

        conn.on("error", (error) => {
          connectBtn.classList.remove("active");
          setStatus("Data connection error: " + (error.type || error.message || "unknown"));
        });
      });

      peer.on("error", (error) => {
        console.error("Peer error:", error);
        connectBtn.classList.remove("active");

        if (error.type === "peer-unavailable") {
          setStatus("Desktop not found. Check Pair Code and keep desktop.html open.");
        } else if (error.type === "network") {
          setStatus("PeerJS network error. Try reload, another browser, or hotspot.");
        } else if (error.type === "server-error") {
          setStatus("PeerJS server error. Reload and try again.");
        } else if (error.type === "browser-incompatible") {
          setStatus("Browser incompatible with WebRTC.");
        } else {
          setStatus("Peer error: " + (error.type || error.message || "unknown"));
        }
      });

      peer.on("disconnected", () => {
        setStatus("Mobile peer disconnected from PeerJS server.");
      });

      peer.on("close", () => {
        setStatus("Mobile peer closed.");
      });
    }

    connectBtn.addEventListener("click", connectToDesktop);

    peerCodeInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        connectToDesktop();
      }
    });

    disconnectBtn.addEventListener("click", () => {
      disconnectExisting();

      inputX = 0;
      inputY = 0;
      boost = false;
      brake = false;

      resetJoystick();

      setStatus("Disconnected.");
    });

    function getJoystickData() {
      const rect = base.getBoundingClientRect();
      const stickSize = stick.offsetWidth || 74;

      return {
        rect: rect,
        stickSize: stickSize,
        centerX: rect.left + rect.width / 2,
        centerY: rect.top + rect.height / 2,
        maxRadius: rect.width / 2 - stickSize / 2
      };
    }

    function setStickPosition(dx, dy) {
      const rect = base.getBoundingClientRect();
      const stickSize = stick.offsetWidth || 74;
      const centerOffset = rect.width / 2 - stickSize / 2;

      stick.style.left = centerOffset + dx + "px";
      stick.style.top = centerOffset + dy + "px";
    }

    function handleJoystick(clientX, clientY) {
      if (motionEnabled) {
        return;
      }

      const data = getJoystickData();

      let dx = clientX - data.centerX;
      let dy = clientY - data.centerY;

      const distance = Math.sqrt(dx * dx + dy * dy);

      if (distance > data.maxRadius) {
        dx = (dx / distance) * data.maxRadius;
        dy = (dy / distance) * data.maxRadius;
      }

      inputX = dx / data.maxRadius;
      inputY = dy / data.maxRadius;

      tiltXEl.textContent = inputX.toFixed(2);
      tiltYEl.textContent = inputY.toFixed(2);

      setStickPosition(dx, dy);
    }

    function resetJoystick() {
      if (motionEnabled) {
        return;
      }

      inputX = 0;
      inputY = 0;

      tiltXEl.textContent = "0.00";
      tiltYEl.textContent = "0.00";

      setStickPosition(0, 0);
    }

    base.addEventListener("touchstart", (event) => {
      const touch = event.touches[0];
      handleJoystick(touch.clientX, touch.clientY);
      event.preventDefault();
    }, { passive: false });

    base.addEventListener("touchmove", (event) => {
      const touch = event.touches[0];
      handleJoystick(touch.clientX, touch.clientY);
      event.preventDefault();
    }, { passive: false });

    base.addEventListener("touchend", () => {
      resetJoystick();
    });

    base.addEventListener("touchcancel", () => {
      resetJoystick();
    });

    base.addEventListener("mousedown", (event) => {
      handleJoystick(event.clientX, event.clientY);

      function moveHandler(moveEvent) {
        handleJoystick(moveEvent.clientX, moveEvent.clientY);
      }

      function upHandler() {
        resetJoystick();
        window.removeEventListener("mousemove", moveHandler);
        window.removeEventListener("mouseup", upHandler);
      }

      window.addEventListener("mousemove", moveHandler);
      window.addEventListener("mouseup", upHandler);
    });

    function activateButton(button, callback) {
      callback(true);
      button.classList.add("active");
    }

    function deactivateButton(button, callback) {
      callback(false);
      button.classList.remove("active");
    }

    boostBtn.addEventListener("touchstart", (event) => {
      activateButton(boostBtn, (value) => boost = value);
      event.preventDefault();
    }, { passive: false });

    boostBtn.addEventListener("touchend", () => {
      deactivateButton(boostBtn, (value) => boost = value);
    });

    boostBtn.addEventListener("touchcancel", () => {
      deactivateButton(boostBtn, (value) => boost = value);
    });

    boostBtn.addEventListener("mousedown", () => {
      activateButton(boostBtn, (value) => boost = value);
    });

    boostBtn.addEventListener("mouseup", () => {
      deactivateButton(boostBtn, (value) => boost = value);
    });

    boostBtn.addEventListener("mouseleave", () => {
      deactivateButton(boostBtn, (value) => boost = value);
    });

    brakeBtn.addEventListener("touchstart", (event) => {
      activateButton(brakeBtn, (value) => brake = value);
      event.preventDefault();
    }, { passive: false });

    brakeBtn.addEventListener("touchend", () => {
      deactivateButton(brakeBtn, (value) => brake = value);
    });

    brakeBtn.addEventListener("touchcancel", () => {
      deactivateButton(brakeBtn, (value) => brake = value);
    });

    brakeBtn.addEventListener("mousedown", () => {
      activateButton(brakeBtn, (value) => brake = value);
    });

    brakeBtn.addEventListener("mouseup", () => {
      deactivateButton(brakeBtn, (value) => brake = value);
    });

    brakeBtn.addEventListener("mouseleave", () => {
      deactivateButton(brakeBtn, (value) => brake = value);
    });

    async function enableMotionControls() {
      try {
        if (
          typeof DeviceOrientationEvent !== "undefined" &&
          typeof DeviceOrientationEvent.requestPermission === "function"
        ) {
          const permission = await DeviceOrientationEvent.requestPermission();

          if (permission !== "granted") {
            setStatus("Motion permission denied.");
            return;
          }
        }

        motionEnabled = !motionEnabled;

        if (motionEnabled) {
          motionBtn.textContent = "Disable Motion Control";
          motionBtn.classList.add("active");
          controlModeEl.textContent = "Motion";

          inputX = 0;
          inputY = 0;
          setStickPosition(0, 0);

          setStatus(conn && conn.open ? "Motion control enabled." : "Motion enabled. Not connected yet.");
        } else {
          motionBtn.textContent = "Enable Motion Control";
          motionBtn.classList.remove("active");
          controlModeEl.textContent = "Joystick";

          inputX = 0;
          inputY = 0;
          setStickPosition(0, 0);

          setStatus(conn && conn.open ? "Joystick control enabled." : "Joystick enabled. Not connected yet.");
        }
      } catch (error) {
        setStatus("Motion control not available.");
      }
    }

    motionBtn.addEventListener("click", enableMotionControls);

    window.addEventListener("deviceorientation", (event) => {
      if (!motionEnabled) {
        return;
      }

      let gamma = event.gamma || 0;
      let beta = event.beta || 0;

      let x = gamma * MOTION_SENSITIVITY;
      let y = beta * MOTION_SENSITIVITY;

      x = clamp(x, -1, 1);
      y = clamp(y, -1, 1);

      x = applyDeadzone(x);
      y = applyDeadzone(y);

      inputX = x;
      inputY = y;

      tiltXEl.textContent = inputX.toFixed(2);
      tiltYEl.textContent = inputY.toFixed(2);

      const data = getJoystickData();

      setStickPosition(inputX * data.maxRadius, inputY * data.maxRadius);
    });

    window.addEventListener("load", () => {
      updateDebug();
      setStickPosition(0, 0);
    });
  </script>
</body>
</html>
