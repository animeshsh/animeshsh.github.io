<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Drone Desktop Screen | Phone Gamepad</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #050816;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #gameArea {
      width: 100vw;
      height: 100vh;
      position: relative;
      background:
        linear-gradient(rgba(0, 255, 255, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 255, 0.08) 1px, transparent 1px),
        radial-gradient(circle at center, #111933, #050816);
      background-size: 40px 40px, 40px 40px, 100% 100%;
      overflow: hidden;
    }

    #infoPanel {
      position: fixed;
      top: 16px;
      left: 16px;
      width: 330px;
      padding: 16px;
      border-radius: 16px;
      border: 1px solid rgba(0, 255, 255, 0.45);
      background: rgba(0, 0, 0, 0.58);
      box-shadow: 0 0 22px rgba(0, 255, 255, 0.22);
      z-index: 10;
      backdrop-filter: blur(8px);
    }

    #infoPanel h1 {
      margin: 0 0 10px 0;
      font-size: 24px;
      color: cyan;
      text-shadow: 0 0 12px cyan;
    }

    .label {
      color: #9ff;
      font-size: 13px;
      margin-top: 10px;
    }

    .value {
      font-size: 16px;
      margin-top: 4px;
      word-break: break-word;
    }

    #peerId {
      display: inline-block;
      padding: 8px 10px;
      margin-top: 6px;
      border-radius: 10px;
      background: rgba(0, 255, 255, 0.12);
      border: 1px solid rgba(0, 255, 255, 0.55);
      color: white;
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    #copyBtn {
      margin-top: 8px;
      width: 100%;
      padding: 10px;
      border-radius: 12px;
      border: 1px solid cyan;
      background: rgba(0, 255, 255, 0.12);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    #copyBtn:hover {
      background: rgba(0, 255, 255, 0.25);
    }

    #status {
      color: #7dff7d;
      font-weight: bold;
    }

    #drone {
      width: 76px;
      height: 76px;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) rotate(0deg);
      border-radius: 18px;
      background: cyan;
      box-shadow:
        0 0 18px cyan,
        0 0 42px rgba(0, 255, 255, 0.75),
        0 0 70px rgba(0, 255, 255, 0.35);
      transition: box-shadow 0.08s linear;
    }

    #drone::before,
    #drone::after {
      content: "";
      position: absolute;
      background: rgba(0, 255, 255, 0.8);
      box-shadow: 0 0 12px cyan;
      border-radius: 8px;
    }

    #drone::before {
      width: 130px;
      height: 12px;
      left: -27px;
      top: 32px;
    }

    #drone::after {
      width: 12px;
      height: 130px;
      left: 32px;
      top: -27px;
    }

    .prop {
      position: absolute;
      width: 26px;
      height: 26px;
      border: 2px solid #050816;
      background: white;
      border-radius: 50%;
      z-index: 2;
      box-shadow: 0 0 12px white;
    }

    #p1 {
      left: -36px;
      top: -36px;
    }

    #p2 {
      right: -36px;
      top: -36px;
    }

    #p3 {
      left: -36px;
      bottom: -36px;
    }

    #p4 {
      right: -36px;
      bottom: -36px;
    }

    #trailCanvas {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.85;
    }

    #bottomHud {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 14px;
      padding: 12px 16px;
      border-radius: 999px;
      border: 1px solid rgba(0, 255, 255, 0.35);
      background: rgba(0, 0, 0, 0.52);
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
      z-index: 10;
      font-size: 14px;
      backdrop-filter: blur(8px);
    }

    .hudItem span {
      color: cyan;
      font-weight: bold;
    }

    @media (max-width: 700px) {
      #infoPanel {
        width: calc(100vw - 32px);
      }

      #bottomHud {
        width: calc(100vw - 32px);
        justify-content: center;
        flex-wrap: wrap;
        border-radius: 18px;
      }
    }
  </style>
</head>

<body>
  <div id="gameArea">
    <canvas id="trailCanvas"></canvas>

    <div id="drone">
      <div class="prop" id="p1"></div>
      <div class="prop" id="p2"></div>
      <div class="prop" id="p3"></div>
      <div class="prop" id="p4"></div>
    </div>
  </div>

  <div id="infoPanel">
    <h1>Drone Screen</h1>

    <div class="label">Pair Code</div>
    <div id="peerId">Creating...</div>

    <button id="copyBtn">Copy Pair Code</button>

    <div class="label">Status</div>
    <div class="value" id="status">Starting PeerJS...</div>

    <div class="label">Open on phone</div>
    <div class="value">
      Open <strong>gamepad.html</strong> on your mobile and enter the Pair Code.
    </div>
  </div>

  <div id="bottomHud">
    <div class="hudItem">Mode: <span id="modeHud">Waiting</span></div>
    <div class="hudItem">X: <span id="xHud">0</span></div>
    <div class="hudItem">Y: <span id="yHud">0</span></div>
    <div class="hudItem">Speed: <span id="speedHud">Normal</span></div>
  </div>

  <!-- PeerJS CDN -->
  <script src="https://unpkg.com/peerjs@1.5.5/dist/peerjs.min.js"></script>

  <script>
    const peerIdEl = document.getElementById("peerId");
    const statusEl = document.getElementById("status");
    const copyBtn = document.getElementById("copyBtn");

    const drone = document.getElementById("drone");
    const gameArea = document.getElementById("gameArea");

    const modeHud = document.getElementById("modeHud");
    const xHud = document.getElementById("xHud");
    const yHud = document.getElementById("yHud");
    const speedHud = document.getElementById("speedHud");

    const trailCanvas = document.getElementById("trailCanvas");
    const ctx = trailCanvas.getContext("2d");

    let peer;
    let conn;

    let x = window.innerWidth / 2;
    let y = window.innerHeight / 2;

    let inputX = 0;
    let inputY = 0;

    let boost = false;
    let brake = false;
    let controlMode = "waiting";

    let angle = 0;

    const baseSpeed = 5.2;
    const droneSize = 76;

    function resizeCanvas() {
      trailCanvas.width = window.innerWidth;
      trailCanvas.height = window.innerHeight;
    }

    resizeCanvas();

    window.addEventListener("resize", () => {
      resizeCanvas();

      x = Math.max(droneSize / 2, Math.min(window.innerWidth - droneSize / 2, x));
      y = Math.max(droneSize / 2, Math.min(window.innerHeight - droneSize / 2, y));
    });

    function createPeerId() {
      const randomPart = Math.random().toString(36).substring(2, 8);
      return "drone-" + randomPart;
    }

    function setupPeer() {
      const customPeerId = createPeerId();

      peer = new Peer(customPeerId);

      peer.on("open", (id) => {
        peerIdEl.textContent = id;
        statusEl.textContent = "Waiting for phone controller...";
        modeHud.textContent = "Waiting";
      });

      peer.on("connection", (connection) => {
        conn = connection;

        statusEl.textContent = "Phone connected.";
        modeHud.textContent = "Connected";

        conn.on("data", (data) => {
          if (!data || data.type !== "input") return;

          inputX = Number(data.x) || 0;
          inputY = Number(data.y) || 0;

          boost = Boolean(data.boost);
          brake = Boolean(data.brake);

          controlMode = data.controlMode || "gamepad";

          if (controlMode === "motion") {
            modeHud.textContent = "Motion";
          } else {
            modeHud.textContent = "Joystick";
          }
        });

        conn.on("close", () => {
          statusEl.textContent = "Phone disconnected.";
          modeHud.textContent = "Disconnected";
          inputX = 0;
          inputY = 0;
          boost = false;
          brake = false;
        });

        conn.on("error", () => {
          statusEl.textContent = "Connection error.";
        });
      });

      peer.on("error", (error) => {
        statusEl.textContent = "PeerJS error: " + error.type;
      });
    }

    copyBtn.addEventListener("click", async () => {
      const code = peerIdEl.textContent;

      if (!code || code === "Creating...") return;

      try {
        await navigator.clipboard.writeText(code);
        copyBtn.textContent = "Copied!";
        setTimeout(() => {
          copyBtn.textContent = "Copy Pair Code";
        }, 1200);
      } catch {
        copyBtn.textContent = "Copy failed";
        setTimeout(() => {
          copyBtn.textContent = "Copy Pair Code";
        }, 1200);
      }
    });

    function drawTrail() {
      ctx.fillStyle = "rgba(5, 8, 22, 0.12)";
      ctx.fillRect(0, 0, trailCanvas.width, trailCanvas.height);

      ctx.beginPath();
      ctx.arc(x, y, 5, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(0, 255, 255, 0.8)";
      ctx.shadowBlur = 18;
      ctx.shadowColor = "cyan";
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    function updateDrone() {
      let finalSpeed = baseSpeed;

      if (boost) {
        finalSpeed = baseSpeed * 2.1;
        speedHud.textContent = "Boost";
      } else if (brake) {
        finalSpeed = baseSpeed * 0.35;
        speedHud.textContent = "Brake";
      } else {
        speedHud.textContent = "Normal";
      }

      const dx = inputX * finalSpeed;
      const dy = inputY * finalSpeed;

      x += dx;
      y += dy;

      const half = droneSize / 2;

      x = Math.max(half, Math.min(window.innerWidth - half, x));
      y = Math.max(half, Math.min(window.innerHeight - half, y));

      if (Math.abs(dx) > 0.05 || Math.abs(dy) > 0.05) {
        angle = Math.atan2(dy, dx) * 180 / Math.PI + 90;
      }

      drone.style.left = x + "px";
      drone.style.top = y + "px";
      drone.style.transform = `translate(-50%, -50%) rotate(${angle}deg)`;

      if (boost) {
        drone.style.boxShadow =
          "0 0 26px cyan, 0 0 70px rgba(0,255,255,0.95), 0 0 110px rgba(0,255,255,0.5)";
      } else if (brake) {
        drone.style.boxShadow =
          "0 0 12px cyan, 0 0 24px rgba(0,255,255,0.55)";
      } else {
        drone.style.boxShadow =
          "0 0 18px cyan, 0 0 42px rgba(0,255,255,0.75), 0 0 70px rgba(0,255,255,0.35)";
      }

      xHud.textContent = Math.round(x);
      yHud.textContent = Math.round(y);
    }

    function gameLoop() {
      drawTrail();
      updateDrone();
      requestAnimationFrame(gameLoop);
    }

    setupPeer();
    gameLoop();
  </script>
</body>
</html>
