<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drone Pilot Pro | Xbox Edition</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-red: #ff4757;
            --bg-dark: #0a0a0a;
        }
        body { 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: var(--bg-dark); 
            font-family: 'Courier New', Courier, monospace; 
            color: var(--neon-blue); 
            overflow: hidden; 
        }
        .game-container {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }
        canvas { 
            background: #121225; 
            border: 2px solid var(--neon-blue); 
            border-radius: 8px; 
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.15); 
        }
        .side-panel {
            width: 160px;
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border: 1px solid rgba(0, 210, 255, 0.3);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .side-panel h3 { margin: 0; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        .slider-wrap { display: flex; flex-direction: column; gap: 10px; }
        
        input[type=range] {
            pointer-events: none; 
            accent-color: var(--neon-blue);
            background: #333;
            height: 4px;
            border-radius: 2px;
            appearance: none;
        }

        .ui { 
            position: absolute; 
            top: 40px; 
            pointer-events: none; 
            width: 800px;
            text-align: center;
        }
        #score { font-size: 28px; font-weight: bold; text-shadow: 0 0 10px var(--neon-blue); }
        .debug {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 11px;
            color: rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="ui">
            <div id="score">CONNECT XBOX CONTROLLER</div>
        </div>

        <canvas id="gameCanvas" width="800" height="500"></canvas>

        <div class="side-panel">
            <h3>System Status</h3>
            <div class="slider-wrap">
                <label>Flow Speed: <span id="speedVal">1.0</span>x</label>
                <input type="range" id="speedSlider" min="0.5" max="3" step="0.1" value="1">
                <div style="font-size: 9px; color: #666; text-align: center;">RIGHT STICK CONTROL</div>
            </div>
            <hr style="border:0; border-top:1px solid #333; width:100%">
            <div style="font-size: 10px; color: #555; line-height: 1.4;">
                Left Stick: Throttle (Center = 50%)<br><br>
                Right Stick: Warp Speed
            </div>
        </div>
    </div>

    <div class="debug" id="debugInfo">Awaiting Xbox Input...</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreElement = document.getElementById("score");
    const debugElement = document.getElementById("debugInfo");
    const speedSlider = document.getElementById("speedSlider");
    const speedValText = document.getElementById("speedVal");

    // --- Assets (Embedded SVGs) ---
    // Drone Tilted forward 18 deg (Positive 18 as requested)
    const svgTilt = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100"><g transform="rotate(18 100 50)" fill="#175B7B" stroke="#000" stroke-width="1.5"><polygon points="25,43 175,43 175,49 125,49 125,65 75,65 75,49 25,49" /><rect x="33" y="39" width="4" height="4" /><rect x="163" y="39" width="4" height="4" /><ellipse cx="21" cy="38" rx="18" ry="3" /><ellipse cx="49" cy="38" rx="18" ry="3" /><ellipse cx="151" cy="38" rx="18" ry="3" /><ellipse cx="179" cy="38" rx="18" ry="3" /></g></svg>`;
    const svgHoriz = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100"><g fill="#175B7B" stroke="#000" stroke-width="1.5"><polygon points="25,43 175,43 175,49 125,49 125,65 75,65 75,49 25,49" /><rect x="33" y="39" width="4" height="4" /><rect x="163" y="39" width="4" height="4" /><ellipse cx="21" cy="38" rx="18" ry="3" /><ellipse cx="49" cy="38" rx="18" ry="3" /><ellipse cx="151" cy="38" rx="18" ry="3" /><ellipse cx="179" cy="38" rx="18" ry="3" /></g></svg>`;

    const droneTiltImg = new Image();
    const droneHorizImg = new Image();
    droneTiltImg.src = 'data:image/svg+xml;base64,' + btoa(svgTilt);
    droneHorizImg.src = 'data:image/svg+xml;base64,' + btoa(svgHoriz);

    // --- State ---
    let score = 0;
    let gameActive = false;
    let gameStarted = false;
    let readyToRestart = false; 
    let frames = 0;
    let throttleValue = 0; 
    let gameSpeedMultiplier = 1.0;

    const player = {
        x: 120, y: 250, width: 80, height: 40,
        dy: 0, gravity: 0.20, thrustPower: -0.45, rotation: 0
    };

    const obstacles = [];
    const obstacleGap = 180;

    function updateInput() {
        const gamepads = navigator.getGamepads();
        let gp = null;
        
        // Find the first active gamepad
        for (let i = 0; i < gamepads.length; i++) {
            if (gamepads[i]) { gp = gamepads[i]; break; }
        }

        if (gp) {
            // Xbox Left Stick Y-Axis (Index 1)
            // -1.0 (Up) to 1.0 (Down)
            // We want Up = 100%, Mid = 50%, Down = 0%
            let rawY = gp.axes[1];
            throttleValue = (rawY * -1 - 1) / -  2;

            // Xbox sticks are sensitive. Add a tiny deadzone at bottom.
            if (throttleValue < 0.05) {
                throttleValue = 0;
                readyToRestart = true;
            }

            // Right Stick X-Axis (Index 2) for Speed Control
            let rawRightX = gp.axes[2]; 
            let mappedSpeed = ((rawRightX + 1) / 2) * (3.0 - 0.5) + 0.5;
            
            gameSpeedMultiplier = mappedSpeed;
            speedSlider.value = mappedSpeed;
            speedValText.innerText = mappedSpeed.toFixed(1);

            debugElement.innerText = `Xbox Stick L-Y: ${Math.round(throttleValue * 100)}% | R-X: ${Math.round(rawRightX * 100)}%`;

            // Auto-start if throttle is pushed up from the bottom
            if (!gameActive && readyToRestart && throttleValue > 0.1) {
                resetGame();
            }
        } else {
            debugElement.innerText = "SEARCHING FOR XBOX CONTROLLER...";
        }
    }

    function resetGame() {
        score = 0;
        player.y = 250; player.dy = 0; player.rotation = 0;
        obstacles.length = 0;
        gameActive = true; gameStarted = true; readyToRestart = false;
        frames = 0;
        scoreElement.innerText = "SCORE: 0";
    }

    function drawPlayer() {
        ctx.save();
        ctx.translate(player.x + player.width / 2, player.y + player.height / 2);
        
        // Tilt animation based on thrust
        let targetRot = (throttleValue > 0.5) ? -10 : 10;
        player.rotation += (targetRot - player.rotation) * 0.1;
        ctx.rotate(player.rotation * Math.PI / 180);

        // Throttle visualization: if above 50%, show horiz drone, else tilt
        let img = (throttleValue > 0.5) ? droneHorizImg : droneTiltImg;
        ctx.drawImage(img, -player.width/2, -player.height/2, player.width, player.height);
        
        ctx.restore();
    }

    function createObstacle() {
        let minH = 60;
        let maxH = canvas.height - obstacleGap - 60;
        let h = Math.random() * (maxH - minH) + minH;
        obstacles.push({ x: canvas.width, y: 0, w: 50, h: h, passed: false });
        obstacles.push({ x: canvas.width, y: h + obstacleGap, w: 50, h: canvas.height, passed: false });
    }

    function update() {
        updateInput();
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Motion Grid Background
        ctx.strokeStyle = "rgba(0, 210, 255, 0.08)";
        let scrollOffset = (frames * 2 * gameSpeedMultiplier) % 40;
        for(let i=0; i<=canvas.width + 40; i+=40) {
            ctx.beginPath();
            ctx.moveTo(i - scrollOffset, 0); ctx.lineTo(i - scrollOffset, canvas.height);
            ctx.stroke();
        }

        if (!gameActive) {
            drawPlayer();
            ctx.fillStyle = "white";
            ctx.textAlign = "center";
            ctx.font = "bold 16px Courier New";
            if (!gameStarted) {
                ctx.fillText("PUSH LEFT STICK UP TO START", canvas.width/2, canvas.height/2);
            } else {
                ctx.fillStyle = "#ff4757";
                ctx.fillText("SYSTEM CRASH", canvas.width/2, canvas.height/2 - 20);
                ctx.fillStyle = "white";
                ctx.font = "12px Courier New";
                ctx.fillText("PULL LEFT STICK DOWN TO REBOOT", canvas.width/2, canvas.height/2 + 20);
            }
            requestAnimationFrame(update);
            return;
        }

        // Physics
        player.dy += player.gravity; // Constant gravity
        player.dy += (throttleValue * player.thrustPower); // Analog thrust
        player.dy *= 0.98; // "Air resistance"
        player.y += player.dy;

        // Boundary Collision
        if (player.y < 0 || player.y + player.height > canvas.height) gameActive = false;

        // Obstacles Generation
        let spawnRate = Math.max(30, Math.floor(100 / gameSpeedMultiplier));
        if (frames % spawnRate === 0) createObstacle();

        for (let i = obstacles.length - 1; i >= 0; i--) {
            let o = obstacles[i];
            o.x -= (4 * gameSpeedMultiplier); 

            ctx.fillStyle = "#ff4757";
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#ff4757";
            ctx.fillRect(o.x, o.y, o.w, o.h);
            ctx.shadowBlur = 0;

            // Collision Detection
            if (player.x + 15 < o.x + o.w && 
                player.x + player.width - 15 > o.x &&
                player.y + 10 < o.y + o.h && 
                player.y + player.height - 10 > o.y) {
                gameActive = false;
            }

            // Scoring
            if (!o.passed && o.x + o.w < player.x) {
                o.passed = true;
                if (o.y === 0) {
                    score++;
                    scoreElement.innerText = `SCORE: ${score}`;
                }
            }
            if (o.x + o.w < -100) obstacles.splice(i, 1);
        }

        drawPlayer();
        frames++;
        requestAnimationFrame(update);
    }

    update();
</script>
</body>
</html>
